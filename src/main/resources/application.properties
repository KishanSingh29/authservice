# ================= DATABASE =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/authservice?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=kishan

# ================= JPA =================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# ================= SERVER =================
server.port=9898

# ================= LOGGING =================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG

# ================= HIKARI =================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# ================= KAFKA =================
# ? FIX 1: "producer.bootstrap-servers" galat tha ? yeh sahi hai
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.properties.max.in.flight.requests.per.connection=1
spring.kafka.producer.properties.retries=3
spring.kafka.producer.properties.acks=all

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# ? FIX 2: Spring ka JsonSerializer use karo ? custom UserInfoSerializer hata do
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# ? FIX 3: Type info header band karo ? consumer side confusion hoga
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.kafka.topic-json.name=user_service

logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka=DEBUG

# ================= SECURITY =================
security.basic.enable=false
security.ignored=/**